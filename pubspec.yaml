name: luca
description: Escanea tickets y registra tus gastos automáticamente.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  image_picker: ^1.0.7
  google_mlkit_text_recognition: ^0.15.0
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.6
  http: ^1.2.2
  flutter_local_notifications: ^22.0.1
  workmanager: ^0.9.0+3
  google_mlkit_barcode_scanning: ^0.14.2
  fl_chart: ^1.2.0
  url_launcher: ^6.3.2
  share_plus: ^13.2.0
  path_provider: ^2.1.0
  flutter_secure_storage: ^10.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  sqflite_common_ffi: ^2.4.2

flutter:
  uses-material-design: true
